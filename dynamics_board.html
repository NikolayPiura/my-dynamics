<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Динамики</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 80px 2.5rem 6rem;
    }

    .board {
      max-width: 1700px;
      margin: 0 auto;
    }

    /* TOP BAR */
    .top-bar {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
      flex-wrap: wrap; gap: 14px;
    }

    h1 { font-size: 28px; font-weight: 700; color: #fff; letter-spacing: 0.3px; }

    .top-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

    .open-modal-btn {
      font-size: 15px; padding: 12px 26px;
      border: 1px solid #444; border-radius: 10px;
      cursor: pointer; background: #1e1e1e; color: #e0e0e0;
      font-weight: 500; transition: background 0.15s;
    }
    .open-modal-btn:hover { background: #2a2a2a; border-color: #666; }

    .reset-btn {
      font-size: 15px; padding: 12px 26px;
      border: 1px solid #4a2a00; border-radius: 10px;
      cursor: pointer; background: #1e1200; color: #c8a060;
      font-weight: 500; transition: background 0.15s;
    }
    .reset-btn:hover { background: #2a1a00; border-color: #7a4a00; }

    /* LEGEND */
    .legend {
      display: flex; gap: 26px;
      margin-bottom: 40px;
      flex-wrap: wrap; align-items: center;
    }
    .legend-item { display: flex; align-items: center; gap: 9px; font-size: 15px; color: #888; }
    .legend-dot { width: 18px; height: 18px; border-radius: 5px; flex-shrink: 0; }
    .legend-dot.transparent-dot {
      background: transparent;
      border: 2px solid #555;
    }
    .hint { font-size: 13px; color: #444; margin-left: 6px; }

    /* GRID */
    .columns {
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      gap: 18px;
    }

    .col { display: flex; flex-direction: column; }

    .col-header {
      font-size: 15px; font-weight: 700; text-align: center;
      padding: 20px 8px; background: #1c1c1c;
      border-radius: 12px; border: 1px solid #2a2a2a;
      color: #bbb; margin-bottom: 18px; letter-spacing: 0.3px;
    }

    .col-items { display: flex; flex-direction: column; gap: 16px; }

    .item {
      font-size: 16px;
      padding: 28px 12px;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.1);
      transition: transform 0.08s, filter 0.08s;
      user-select: none;
      line-height: 1.45;
      word-break: break-word;
      font-weight: 500;
      min-height: 76px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .item:hover { transform: scale(1.03); filter: brightness(1.12); }
    .item:active { transform: scale(0.97); }

    .item.red    { background: #c0392b; color: #ffe0de; border-color: #922b21; }
    .item.yellow { background: #b8860b; color: #fff3c0; border-color: #8a6400; }
    .item.green  { background: #1e8449; color: #c8f5d8; border-color: #155d35; }
    .item.none   {
      background: transparent;
      color: #666;
      border: 1px dashed #333;
    }
    .item.none:hover { color: #999; border-color: #555; }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.80);
      backdrop-filter: blur(5px);
      z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #181818;
      border: 1px solid #2e2e2e;
      border-radius: 20px;
      padding: 2.2rem 2rem 1.8rem;
      width: 440px;
      max-width: 94vw;
      box-shadow: 0 30px 80px rgba(0,0,0,0.9);
      animation: popIn 0.17s ease;
    }
    @keyframes popIn {
      from { transform: scale(0.91); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    .modal-header {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 1.4rem;
    }
    .modal h2 { font-size: 18px; font-weight: 600; color: #fff; }
    .modal-close {
      background: none; border: none; color: #555;
      font-size: 24px; cursor: pointer; line-height: 1;
      padding: 0 4px; transition: color 0.12s;
    }
    .modal-close:hover { color: #aaa; }

    .modal-tabs {
      display: flex; gap: 0;
      border: 1px solid #2e2e2e; border-radius: 10px;
      overflow: hidden; margin-bottom: 1.4rem;
    }
    .tab-btn {
      flex: 1; padding: 10px; font-size: 14px; font-weight: 500;
      border: none; background: transparent; color: #666; cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .tab-btn.active { background: #252525; color: #e0e0e0; }
    .tab-btn:first-child { border-right: 1px solid #2e2e2e; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .modal label {
      display: block; font-size: 11px; color: #666;
      margin-bottom: 6px; margin-top: 18px;
      text-transform: uppercase; letter-spacing: 0.6px;
    }
    .modal label:first-of-type { margin-top: 0; }

    .modal input, .modal select {
      width: 100%; font-size: 14px; padding: 11px 13px;
      border: 1px solid #2e2e2e; border-radius: 9px;
      background: #111; color: #e0e0e0;
      outline: none; transition: border-color 0.15s;
    }
    .modal input:focus, .modal select:focus { border-color: #555; }
    .modal select option { background: #1a1a1a; }

    .color-btns { display: flex; gap: 8px; flex-wrap: wrap; }
    .color-btn {
      flex: 1; min-width: 60px; padding: 10px 4px; border-radius: 8px;
      border: 2px solid transparent; cursor: pointer;
      font-size: 12px; font-weight: 600;
      transition: border-color 0.12s, transform 0.08s;
    }
    .color-btn:active { transform: scale(0.96); }
    .color-btn.red    { background: #c0392b; color: #ffe0de; }
    .color-btn.yellow { background: #b8860b; color: #fff3c0; }
    .color-btn.green  { background: #1e8449; color: #c8f5d8; }
    .color-btn.none-btn {
      background: transparent; color: #888;
      border-color: #333 !important;
      border-style: dashed !important;
    }
    .color-btn.selected { border-color: #fff !important; border-style: solid !important; }

    .modal-actions { display: flex; gap: 8px; margin-top: 1.6rem; }
    .btn-cancel {
      flex: 1; padding: 12px; border-radius: 9px;
      border: 1px solid #2e2e2e; background: transparent;
      color: #777; font-size: 14px; cursor: pointer;
      transition: background 0.12s;
    }
    .btn-cancel:hover { background: #222; }
    .btn-confirm {
      flex: 2; padding: 12px; border-radius: 9px;
      border: none; background: #1e6e40;
      color: #c8f5d8; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background 0.12s;
    }
    .btn-confirm:hover { background: #278a52; }

    .delete-col-select {
      width: 100%; font-size: 14px; padding: 11px 13px;
      border: 1px solid #2e2e2e; border-radius: 9px;
      background: #111; color: #e0e0e0;
      outline: none; margin-bottom: 14px;
    }
    .delete-col-select option { background: #1a1a1a; }

    .delete-list {
      display: flex; flex-direction: column; gap: 7px;
      max-height: 360px; overflow-y: auto;
      padding-right: 4px;
    }
    .delete-list::-webkit-scrollbar { width: 4px; }
    .delete-list::-webkit-scrollbar-track { background: transparent; }
    .delete-list::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    .delete-row {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 13px; border-radius: 9px;
      border: 1px solid #2a2a2a; background: #111;
    }
    .delete-row-dot {
      width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0;
    }
    .delete-row-dot.red    { background: #c0392b; }
    .delete-row-dot.yellow { background: #b8860b; }
    .delete-row-dot.green  { background: #1e8449; }
    .delete-row-dot.none   { background: transparent; border: 1px dashed #555; }

    .delete-row-text { flex: 1; font-size: 14px; color: #ccc; line-height: 1.3; }
    .delete-row-btn {
      background: none; border: 1px solid #3a1a1a;
      color: #c0392b; border-radius: 6px;
      padding: 5px 12px; font-size: 12px; cursor: pointer;
      flex-shrink: 0; transition: background 0.12s;
    }
    .delete-row-btn:hover { background: #2a1010; }

    .empty-msg { font-size: 14px; color: #555; text-align: center; padding: 24px 0; }

    /* RESET CONFIRM */
    .reset-confirm {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.80);
      backdrop-filter: blur(5px);
      z-index: 200;
      align-items: center; justify-content: center;
    }
    .reset-confirm.open { display: flex; }
    .reset-box {
      background: #181818; border: 1px solid #2e2e2e;
      border-radius: 18px; padding: 2rem;
      width: 360px; max-width: 94vw;
      text-align: center;
      box-shadow: 0 30px 80px rgba(0,0,0,0.9);
      animation: popIn 0.17s ease;
    }
    .reset-box h3 { font-size: 17px; color: #fff; margin-bottom: 10px; }
    .reset-box p  { font-size: 13px; color: #777; margin-bottom: 1.6rem; line-height: 1.5; }
    .reset-box-actions { display: flex; gap: 10px; }
    .reset-no {
      flex: 1; padding: 11px; border-radius: 9px;
      border: 1px solid #2e2e2e; background: transparent;
      color: #888; font-size: 14px; cursor: pointer;
    }
    .reset-no:hover { background: #222; }
    .reset-yes {
      flex: 1; padding: 11px; border-radius: 9px;
      border: none; background: #7a2020;
      color: #ffd0d0; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .reset-yes:hover { background: #a02828; }
  </style>
</head>
<body>
<div class="board">

  <div class="top-bar">
    <h1>Динамики</h1>
    <div class="top-actions">
      <button class="reset-btn" onclick="openReset()">↺ Сброс цветов</button>
      <button class="open-modal-btn" onclick="openModal()">+ Добавить / удалить пункт</button>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#c0392b"></div>1–3 красный</div>
    <div class="legend-item"><div class="legend-dot" style="background:#b8860b"></div>4–6 жёлтый</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1e8449"></div>8–9 зелёный</div>
    <div class="legend-item"><div class="legend-dot transparent-dot"></div>без цвета</div>
    <span class="hint">· нажмите на пункт для смены цвета (красный → жёлтый → зелёный → прозрачный → ...)</span>
  </div>

  <div class="columns" id="board"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <h2>Пункты</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>

    <div class="modal-tabs">
      <button class="tab-btn active" id="tab-add-btn" onclick="switchTab('add')">Добавить</button>
      <button class="tab-btn" id="tab-del-btn" onclick="switchTab('delete')">Удалить</button>
    </div>

    <!-- ADD -->
    <div class="tab-panel active" id="tab-add">
      <label>Название</label>
      <input type="text" id="m-text" placeholder="Введите текст..." />

      <label>Динамика</label>
      <select id="m-col">
        <option value="0">1 Динамика</option>
        <option value="1">2 Динамика</option>
        <option value="2">3 Динамика</option>
        <option value="3">4 Динамика</option>
        <option value="4">5 Динамика</option>
        <option value="5">6 Динамика</option>
        <option value="6">7 Динамика</option>
        <option value="7">8 Динамика</option>
      </select>

      <label>Цвет</label>
      <div class="color-btns">
        <button class="color-btn red selected"  onclick="selectColor('red')"    id="cb-red">Красный</button>
        <button class="color-btn yellow"         onclick="selectColor('yellow')" id="cb-yellow">Жёлтый</button>
        <button class="color-btn green"          onclick="selectColor('green')"  id="cb-green">Зелёный</button>
        <button class="color-btn none-btn"       onclick="selectColor('none')"   id="cb-none">Без цвета</button>
      </div>

      <div class="modal-actions">
        <button class="btn-cancel"  onclick="closeModal()">Отмена</button>
        <button class="btn-confirm" onclick="confirmAdd()">Добавить</button>
      </div>
    </div>

    <!-- DELETE -->
    <div class="tab-panel" id="tab-delete">
      <select class="delete-col-select" id="del-col" onchange="renderDeleteList()">
        <option value="0">1 Динамика</option>
        <option value="1">2 Динамика</option>
        <option value="2">3 Динамика</option>
        <option value="3">4 Динамика</option>
        <option value="4">5 Динамика</option>
        <option value="5">6 Динамика</option>
        <option value="6">7 Динамика</option>
        <option value="7">8 Динамика</option>
      </select>
      <div class="delete-list" id="delete-list"></div>
    </div>
  </div>
</div>

<!-- RESET CONFIRM -->
<div class="reset-confirm" id="reset-confirm">
  <div class="reset-box">
    <h3>Сброс цветов</h3>
    <p>Все пункты станут прозрачными (без цвета). Это действие нельзя отменить.</p>
    <div class="reset-box-actions">
      <button class="reset-no"  onclick="closeReset()">Отмена</button>
      <button class="reset-yes" onclick="doReset()">Сбросить</button>
    </div>
  </div>
</div>

<script>
  const COLS  = ['1 Динамика','2 Динамика','3 Динамика','4 Динамика','5 Динамика','6 Динамика','7 Динамика','8 Динамика'];
  const CYCLE = ['red','yellow','green','none'];
  let selectedColor = 'red';
  let currentTab = 'add';

  const data = [
    [{t:'Сон',c:'green'},{t:'Фигура',c:'green'},{t:'Отдых',c:'green'},{t:'Гигиена',c:'green'},{t:'Внешний вид',c:'green'},{t:'Режим дня',c:'green'},{t:'Питание',c:'green'},{t:'Эффективность',c:'green'},{t:'Здоровье',c:'yellow'},{t:'Навыки',c:'yellow'},{t:'Техническое образование',c:'yellow'},{t:'Функциональность тела',c:'yellow'},{t:'Общее образование',c:'yellow'}],
    [{t:'Взаимоотношения с Сашей',c:'red'},{t:'Совместные увлечения',c:'red'},{t:'Путешествия',c:'red'},{t:'Дети',c:'red'},{t:'Секс',c:'red'}],
    [{t:'Инвестиционный фонд PFF',c:'yellow'},{t:'Управление другими фондами',c:'yellow'},{t:'Климэйт',c:'red'},{t:'Благотворительный фонд',c:'red'},{t:'Наставничество',c:'yellow'},{t:'Настольный теннис',c:'yellow'},{t:'Семья',c:'yellow'},{t:'Бизнес',c:'red'},{t:'Франшиза',c:'red'},{t:'PurrCat',c:'red'},{t:'Родительский дом',c:'red'},{t:'Снитч',c:'red'},{t:'Саентология',c:'red'},{t:'Друзья',c:'red'},{t:'Шахматы',c:'yellow'},{t:'Спортивный зал + ММА',c:'yellow'}],
    [{t:'Алкогольная зависимость',c:'yellow'},{t:'Наркологическая зависимость',c:'yellow'},{t:'Табачная зависимость',c:'yellow'},{t:'Брак, Разводы',c:'red'},{t:'Война',c:'red'},{t:'Люди преклонного возраста',c:'red'},{t:'Образование детей',c:'red'}],
    [{t:'Котики',c:'green'},{t:'Деревья',c:'green'},{t:'Животные',c:'green'},{t:'Птицы',c:'red'}],
    [{t:'Капитал',c:'yellow'},{t:'Жилье',c:'yellow'},{t:'Мелкие объекты',c:'yellow'},{t:'Чужое имущество',c:'red'},{t:'Чистота планеты',c:'yellow'},{t:'Искуственный интеллект',c:'yellow'},{t:'Чистота воды',c:'red'}],
    [{t:'Духовная свобода',c:'yellow'},{t:'Этика',c:'yellow'},{t:'Личные необходимости',c:'red'},{t:'Положение на шкале тонов',c:'red'},{t:'Контроль над телом',c:'yellow'},{t:'Драматизация',c:'yellow'},{t:'Клонирование других Тетанов',c:'red'}],
    [{t:'Концепт',c:'yellow'},{t:'Абсолют',c:'red'}]
  ];

  function cycleColor(ci, ii) {
    const item = data[ci][ii];
    item.c = CYCLE[(CYCLE.indexOf(item.c) + 1) % CYCLE.length];
    render();
  }

  function openModal() {
    switchTab('add');
    document.getElementById('m-text').value = '';
    selectColor('red');
    document.getElementById('modal-overlay').classList.add('open');
    setTimeout(() => document.getElementById('m-text').focus(), 80);
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  function overlayClick(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-add').classList.toggle('active', tab === 'add');
    document.getElementById('tab-delete').classList.toggle('active', tab === 'delete');
    document.getElementById('tab-add-btn').classList.toggle('active', tab === 'add');
    document.getElementById('tab-del-btn').classList.toggle('active', tab === 'delete');
    if (tab === 'delete') renderDeleteList();
  }

  function renderDeleteList() {
    const ci = parseInt(document.getElementById('del-col').value);
    const list = document.getElementById('delete-list');
    list.innerHTML = '';
    if (data[ci].length === 0) {
      list.innerHTML = '<div class="empty-msg">Нет пунктов в этой динамике</div>';
      return;
    }
    data[ci].forEach((item, ii) => {
      const row = document.createElement('div');
      row.className = 'delete-row';
      row.innerHTML = `
        <div class="delete-row-dot ${item.c}"></div>
        <div class="delete-row-text">${item.t}</div>
        <button class="delete-row-btn" onclick="deleteItem(${ci},${ii})">удалить</button>
      `;
      list.appendChild(row);
    });
  }

  function deleteItem(ci, ii) {
    data[ci].splice(ii, 1);
    render();
    renderDeleteList();
  }

  function selectColor(c) {
    selectedColor = c;
    ['red','yellow','green','none'].forEach(x =>
      document.getElementById('cb-' + x).classList.toggle('selected', x === c)
    );
  }

  function confirmAdd() {
    const text = document.getElementById('m-text').value.trim();
    if (!text) { document.getElementById('m-text').focus(); return; }
    const col = parseInt(document.getElementById('m-col').value);
    data[col].push({ t: text, c: selectedColor });
    document.getElementById('m-text').value = '';
    closeModal();
    render();
  }

  function openReset() {
    document.getElementById('reset-confirm').classList.add('open');
  }
  function closeReset() {
    document.getElementById('reset-confirm').classList.remove('open');
  }
  function doReset() {
    data.forEach(col => col.forEach(item => item.c = 'none'));
    closeReset();
    render();
  }

  function render() {
    const board = document.getElementById('board');
    board.innerHTML = '';
    COLS.forEach((colName, ci) => {
      const col = document.createElement('div');
      col.className = 'col';

      const header = document.createElement('div');
      header.className = 'col-header';
      header.textContent = colName;
      col.appendChild(header);

      const items = document.createElement('div');
      items.className = 'col-items';
      data[ci].forEach((item, ii) => {
        const el = document.createElement('div');
        el.className = 'item ' + item.c;
        el.textContent = item.t;
        el.title = 'Нажмите для смены цвета';
        el.onclick = () => cycleColor(ci, ii);
        items.appendChild(el);
      });
      col.appendChild(items);
      board.appendChild(col);
    });
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal(); closeReset(); }
    if (e.key === 'Enter' && currentTab === 'add' && document.getElementById('modal-overlay').classList.contains('open')) confirmAdd();
  });

  render();
</script>
</body>
</html>
